# Ponder indexer for the LDAT contracts on LINEA MAINNET (chainId 59144).
# Separate Fly app `lineadat-indexer` so the live testnet `lineastr-indexer`
# (Base Sepolia, fly.toml) stays untouched. Deploy with:
#   fly deploy -c fly.linea.toml --app lineadat-indexer
#
# Chain-specific addresses + RPC are NOT here - they go via `fly secrets set`
# (PONDER_RPC_URL_59144, STRATEGY_ADDRESS, HOOK_ADDRESS, START_BLOCK) so the SAME
# file is reused for the real LDAT cutover (just change the secrets + redeploy).

app = 'lineadat-indexer'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[env]
  CHAIN_ID = '59144'
  DATABASE_SCHEMA = 'public'
  # Fresh DB dir for the real LDAT app - the old /data/pglite holds the TestDAT
  # rehearsal Ponder app and Ponder 0.16 refuses to reuse another app's schema.
  PONDER_DATABASE_DIRECTORY = '/data/pglite-lineadat'
  # PONDER_RPC_URL_59144 (Infura, embeds API key) - via `fly secrets set`.
  # STRATEGY_ADDRESS, HOOK_ADDRESS, START_BLOCK - via `fly secrets set`.

[http_service]
  internal_port = 42069
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 100

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    # Ponder doesn't open the HTTP port until initial historical sync finishes.
    grace_period = '15m'
    method = 'GET'
    path = '/healthz'

[[restart]]
  policy = 'always'

[[mounts]]
  source = 'lineadat_indexer_data'
  destination = '/data'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

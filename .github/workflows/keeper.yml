name: LineaDAT Keeper

# Phase 3.5 testnet keeper — calls bot.executeRound on schedule.
#
# After Phase 3.5 the strategy.hookAddress is the real LineaDATHook contract,
# so manual `addFees` from an EOA reverts (OnlyHook). Fees now arrive only via
# real swap activity (marketsim cron + user UI swaps). We removed the auto-seed
# step and rely on a separate marketsim workflow + user activity to drive fees.
#
# NOTE on launch gate: until block.timestamp >= hook.deploymentTime[strategy],
# all swaps revert with NotYetLaunched. The keeper still runs but bot rounds
# are no-ops because currentFees stays at 0 (no fees can accrue pre-launch).
# That's expected.
#
# Auto-stop after MAX_RUNS scheduled invocations. Manual workflow_dispatch is
# exempt from the counter.

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (48 rounds per 24h) — compressed test cadence
  workflow_dispatch:

env:
  MAX_RUNS: "48"
  RPC_URL: "https://base-sepolia-rpc.publicnode.com"
  STRATEGY_ADDR: "0x615937AE1eB71248DA407F39AcFea9288CF1784F"
  BOT_ADDR: "0x8FC3c32fd69D714413C1ecD66FA4067b08eE3532"

jobs:
  run-keeper:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Auto-stop after MAX_RUNS scheduled runs
        if: github.event_name == 'schedule'
        run: |
          if [ "${{ github.run_number }}" -gt "${{ env.MAX_RUNS }}" ]; then
            echo "Run #${{ github.run_number }} exceeds MAX_RUNS (${{ env.MAX_RUNS }}). Phase 3.5 observation window complete."
            exit 0
          fi
          echo "Run #${{ github.run_number }} of ${{ env.MAX_RUNS }} max."

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Pre-run state
        run: |
          echo "  currentFees:    $(cast call ${{ env.STRATEGY_ADDR }} 'currentFees()(uint256)' --rpc-url ${{ env.RPC_URL }})"
          echo "  availableFunds: $(cast call ${{ env.STRATEGY_ADDR }} 'availableFunds()(uint256)' --rpc-url ${{ env.RPC_URL }})"
          echo "  ethToTwap:      $(cast call ${{ env.STRATEGY_ADDR }} 'ethToTwap()(uint256)' --rpc-url ${{ env.RPC_URL }})"
          echo "  lastBagId:      $(cast call ${{ env.STRATEGY_ADDR }} 'lastBagId()(uint256)' --rpc-url ${{ env.RPC_URL }})"
          echo "  bot ETH bal:    $(cast balance ${{ env.BOT_ADDR }} --rpc-url ${{ env.RPC_URL }})"

      - name: Execute bot round
        run: |
          ROUND_ID=${{ github.run_number }}
          echo "Calling bot.executeRound($ROUND_ID)..."
          cast send ${{ env.BOT_ADDR }} \
            "executeRound(uint256)" \
            $ROUND_ID \
            --rpc-url ${{ env.RPC_URL }} \
            --private-key ${{ secrets.KEEPER_PK }} \
            --json | python3 -c "import json,sys;d=json.load(sys.stdin);print(f'  tx={d[\"transactionHash\"]} status={d.get(\"status\",\"?\")} block={d.get(\"blockNumber\",\"?\")} gas={d.get(\"gasUsed\",\"?\")}')"

      - name: Post-run state
        if: always()
        run: |
          echo "=== Post-run ==="
          echo "  currentFees:    $(cast call ${{ env.STRATEGY_ADDR }} 'currentFees()(uint256)' --rpc-url ${{ env.RPC_URL }})"
          echo "  availableFunds: $(cast call ${{ env.STRATEGY_ADDR }} 'availableFunds()(uint256)' --rpc-url ${{ env.RPC_URL }})"
          echo "  ethToTwap:      $(cast call ${{ env.STRATEGY_ADDR }} 'ethToTwap()(uint256)' --rpc-url ${{ env.RPC_URL }})"
          echo "  lastBagId:      $(cast call ${{ env.STRATEGY_ADDR }} 'lastBagId()(uint256)' --rpc-url ${{ env.RPC_URL }})"
          echo "  bot ETH bal:    $(cast balance ${{ env.BOT_ADDR }} --rpc-url ${{ env.RPC_URL }} --ether)"
